<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Encode the full path and redirect to index.html
      const l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
